<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Hours Submission</title>
    <style>
        :root {
            --primary-color: #25D366; /* WhatsApp Green */
            --primary-hover: #128C7E;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
            --danger-color: #dc3545;
            --danger-hover: #bd2130;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            color: var(--primary-hover);
            text-align: center;
        }

        .driver-info {
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        /* Dynamic Row Styling */
        .entry-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
            animation: fadeIn 0.2s ease-in;
        }

        .row-date { flex: 2; }
        .row-hours { flex: 1; }
        
        .row-delete {
            flex: 0 0 auto;
        }

        .btn-delete {
            background-color: #fce8e6;
            color: var(--danger-color);
            border: 1px solid #fad2cf;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background-color: var(--danger-color);
            color: white;
            border-color: var(--danger-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button.action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-next {
            background-color: #e1f5fe;
            color: #0288d1;
            border: 1px solid #b3e5fc;
        }

        .btn-next:hover {
            background-color: #b3e5fc;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .hidden { display: none; }
        .success-message { text-align: center; padding: 20px; }
        .success-message h3 { color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <div id="form-container">
        <h2>Log Hours Worked</h2>
        
        <div class="driver-info">
            <div class="form-group">
                <label for="driver-name">Driver Name</label>
                <input type="text" id="driver-name" list="drivers-list" placeholder="Select or type your name..." required>
                
                <datalist id="drivers-list">
                    <option value="Amrit Singh"></option>
                    <option value="Pankajdeep Singh"></option>
                    <option value="Jagrup Singh"></option>
                  
                    </datalist>
            </div>
        </div>

        <div id="entries-container">
            <div class="entry-row">
                <div class="row-date">
                    <label>Date</label>
                    <input type="date" class="date-input" required>
                </div>
                <div class="row-hours">
                    <label>Hours</label>
                    <input type="number" class="hours-input" min="0" max="50" step="0.5"  value="12" required>
                </div>
                <div style="width: 42px;"></div>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="action-btn btn-next" id="add-row-btn">+ Add Another Day</button>
            <button type="button" class="action-btn btn-submit" id="submit-btn">Submit Hours</button>
        </div>
    </div>

    <div id="success-container" class="hidden">
        <div class="success-message">
            <h3>✓ Submission Received</h3>
            <p>Your hours have been recorded successfully.</p>
            <button onclick="window.location.reload()" style="background: var(--bg-color); color: var(--text-color); margin-top: 15px; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer;">Submit Another Form</button>
        </div>
    </div>
</div>

<script>
    const entriesContainer = document.getElementById('entries-container');
    const addRowBtn = document.getElementById('add-row-btn');
    const submitBtn = document.getElementById('submit-btn');
    const formContainer = document.getElementById('form-container');
    const successContainer = document.getElementById('success-container');
    const driverNameInput = document.getElementById('driver-name');

    // Auto-populate today's date on the first row
    document.querySelector('.date-input').valueAsDate = new Date();

    // Event Listener to ADD a new row
    addRowBtn.addEventListener('click', () => {
        const newRow = document.createElement('div');
        newRow.className = 'entry-row';

        const dateInputs = document.querySelectorAll('.date-input');
        const lastDateVal = dateInputs[dateInputs.length - 1].value;
        let nextDateStr = '';
        if (lastDateVal) {
            const lastDate = new Date(lastDateVal);
            lastDate.setDate(lastDate.getDate() + 1);
            nextDateStr = lastDate.toISOString().split('T')[0];
        }

        newRow.innerHTML = `
            <div class="row-date">
                <label>Date</label>
                <input type="date" class="date-input" value="${nextDateStr}" required>
            </div>
            <div class="row-hours">
                <label>Hours</label>
                <input type="number" class="hours-input" min="0" max="50" step="0.5"  value="12" required>
            </div>
            <div class="row-delete">
                <button type="button" class="btn-delete" title="Delete Row" onclick="deleteRow(this)">&times;</button>
            </div>
        `;

        entriesContainer.appendChild(newRow);
        newRow.scrollIntoView({ behavior: 'smooth' });
    });

    function deleteRow(buttonElement) {
        const rowToDestroy = buttonElement.closest('.entry-row');
        rowToDestroy.remove();
    }

    // Event Listener for the Submit Button
    submitBtn.addEventListener('click', () => {
        const driverName = driverNameInput.value.trim();
        
        if (!driverName) {
            alert('Please select or type your name.');
            driverNameInput.focus();
            return;
        }

        const dateInputs = document.querySelectorAll('.date-input');
        const hoursInputs = document.querySelectorAll('.hours-input');
        const shiftData = [];
        let totalHours = 0;
        let isValid = true;

        dateInputs.forEach((dateInput, index) => {
            const date = dateInput.value;
            const hours = parseFloat(hoursInputs[index].value);

            if (!date || isNaN(hours)) {
                isValid = false;
                return;
            }

            shiftData.push({ date: date, hours: hours });
            totalHours += hours;
        });

        if (!isValid) {
            alert('Please fill out all Date and Hours boxes before submitting.');
            return;
        }

        const submissionPayload = {
            driver: driverName,
            submittedAt: new Date().toISOString(),
            totalHoursLogged: totalHours,
            shifts: shiftData
        };

        console.log("Data compiled for backend:", submissionPayload);

        formContainer.classList.add('hidden');
        successContainer.classList.remove('hidden');
    });
</script>

</body>
</html>
