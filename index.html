<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <link rel="stylesheet" href="style.css">
    <title>Driver Hours Submission</title>
   
</head>
<body>

<div class="container">
    <div id="form-container">
        <h2>Log Hours Worked</h2>
        
        <div class="driver-info">
            <div class="form-group">
                <label for="drivers">Driver Name</label>
                <!-- <input type="text" id="driver-name" list="drivers-list" placeholder="Tap to choose name..." required> -->
                
                <!-- <datalist id="drivers-list">
                    <option value="Amrit Singh"></option>
                    <option value="Pankajdeep Singh"></option>
                    <option value="Jagrup Singh"></option>
                </datalist> -->
            <select name="drivers" id="drivers">
                <option value="" disabled selected>Tap to choose name...</option>
                <option value="Amrit Singh">Amrit Singh</option>
                <option value="Pankajdeep Singh">Pankajdeep Singh</option>
                <option value="Jagrup Singh">Jagrup Singh</option>
            </select>
            </div>
        </div>

        <div id="entries-container">
            <div class="entry-row">
                <div class="row-date">
                    <label>Date</label>
                    <input type="date" class="date-input" required>
                </div>
                <div class="row-hours">
                    <label>Hours Worked</label>
                    <input type="number" class="hours-input" min="0" max="250" step="0.5" inputmode="decimal" value="12" required>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="action-btn btn-submit" id="submit-btn">Submit Hours</button>
            <button type="button" class="action-btn btn-next" id="add-row-btn">+ Add Another Day</button>
        </div>
    </div>

    <div id="success-container" class="hidden">
        <div class="success-message">
            <h3>✓ Submitted</h3>
            <p>Your shift logs have been successfully sent to payroll.</p>
            <button onclick="window.location.reload()" style="background: #e9ecef; color: #333; margin-top: 25px; border: none; padding: 14px 24px; border-radius: 8px; font-weight: bold; font-size: 1rem; width: 100%;">Log More Hours</button>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
